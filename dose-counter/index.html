<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dose Counter</title>

  <!-- Bootstrap 5.3: base styling, responsive grid, accessible defaults -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Shared scaffold styles for this family of apps -->
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>

  <main class="app-shell" x-data="doseCounter()">

    <header class="app-header">
      <h1>Dose Counter</h1>
      <p>Enter the course length and frequency to calculate the total number of doses.</p>
    </header>

    <form novalidate @submit.prevent="calculate()">

      <div class="field-group">
        <label for="days" class="form-label">Number of days</label>
        <input
          type="text"
          id="days"
          name="days"
          class="form-control"
          inputmode="numeric"
          autocomplete="off"
          placeholder="e.g. 10"
          aria-describedby="days-hint"
          x-model="daysInput"
          @input="calculate()">
        <div id="days-hint" class="field-hint">
          Total length of the course, in days.
        </div>
      </div>

      <div class="field-group">
        <label for="frequency" class="form-label">Frequency</label>
        <select
          id="frequency"
          name="frequency"
          class="form-select"
          x-model="frequency"
          @change="calculate()">
          <option value="qd">qd — once daily</option>
          <option value="bid">bid — twice daily</option>
          <option value="tid">tid — three times daily</option>
          <option value="qid">qid — four times daily</option>
        </select>
        <p
          class="is-invalid-message text-danger mt-1"
          x-show="errorMessage"
          x-text="errorMessage"
          role="alert"></p>
      </div>

    </form>

    <section
      class="result-panel"
      aria-live="polite"
      :hidden="!hasResult">
      <p class="result-label" id="result-label">Total doses needed</p>
      <p class="result-value" aria-labelledby="result-label" x-text="totalDoses"></p>
    </section>

    <form novalidate x-show="hasResult" @submit.prevent="commitFirstDoseDate()">

      <div class="field-group">
        <label for="first-dose-date" class="form-label">Date of first dispense</label>
        <input
          type="text"
          id="first-dose-date"
          name="first-dose-date"
          class="form-control"
          inputmode="text"
          autocomplete="off"
          placeholder="MM/DD/YYYY"
          aria-describedby="first-dose-date-hint"
          x-model="firstDoseDateInput"
          @input="parseFirstDoseDate()"
          @blur="commitFirstDoseDate()"
          @keydown.enter.prevent="commitFirstDoseDate()">
        <div id="first-dose-date-hint" class="field-hint">
          The date the first dose was given.
        </div>
        <p
          class="is-invalid-message text-danger mt-1"
          x-show="firstDoseDateError"
          x-text="firstDoseDateError"
          role="alert"></p>
      </div>

      <div class="field-group" x-show="frequency !== 'qd'">
        <label for="first-day-dose-count" class="form-label">How many doses were given that day</label>
        <select
          id="first-day-dose-count"
          name="first-day-dose-count"
          class="form-select"
          x-model.number="firstDayDoseCount"
          @change="computeSchedule()">
          <template x-for="n in doseNumberOptions" :key="n">
            <option :value="n" x-text="doseCountLabel(n)"></option>
          </template>
        </select>
        <div class="field-hint">
          Number of doses given on the day of the first dispense.
        </div>
      </div>

      <div class="field-group" x-show="showTodayDoseCount">
        <label for="today-dose-count" class="form-label">How many doses have been given today</label>
        <select
          id="today-dose-count"
          name="today-dose-count"
          class="form-select"
          x-model.number="todayDoseCount"
          @change="computeSchedule()">
          <template x-for="n in todayDoseOptions" :key="n">
            <option :value="n" x-text="doseCountLabel(n)"></option>
          </template>
        </select>
        <p
          class="is-invalid-message text-danger mt-1"
          x-show="scheduleError"
          x-text="scheduleError"
          role="alert"></p>
        <output class="calc-result" for="today-dose-count" x-show="scheduleRemainingSummary" x-text="scheduleRemainingSummary"></output>
      </div>

      <output class="calc-result" x-show="finalDoseSummary" x-text="finalDoseSummary"></output>

    </form>

  </main>

  <!-- Alpine.js: adds reactive behavior directly to the semantic HTML above -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="../shared/date-utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
